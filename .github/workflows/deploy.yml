name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          NODE_ENV: production

      - name: Check build output exists
        run: |
          echo "=== .output contents ==="
          ls -la .output/ || echo "WARNING: .output/ not found!"
          echo "=== .output/public contents ==="
          ls -la .output/public/ || echo "WARNING: .output/public/ not found!"

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Publish to Cloudflare Pages
        run: |
          wrangler pages project create leafva-academy --production-branch=main 2>/dev/null || true
          wrangler pages deploy .output/public \
            --project-name=leafva-academy \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
