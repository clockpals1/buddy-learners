name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          NODE_ENV: production

      - name: Scan build output
        id: scan
        run: |
          echo "== Top-level after build =="
          ls -la
          echo ""
          echo "== Key files =="
          find . -not -path "*/node_modules/*" -not -path "*/.git/*" \
            \( -name "*.html" -o -name "*.mjs" -o -name "_worker.js" -o -name "index.js" \) \
            2>/dev/null | sort
          echo ""
          # Determine deploy dir
          if [ -f ".output/public/_worker.js" ]; then
            echo "MODE=pages" >> $GITHUB_OUTPUT
            echo "DEPLOY_DIR=.output/public" >> $GITHUB_OUTPUT
            echo "✅ cloudflare-pages mode: .output/public/_worker.js found"
          elif [ -f ".output/server/index.mjs" ]; then
            echo "MODE=workers" >> $GITHUB_OUTPUT
            echo "✅ cloudflare-workers mode: .output/server/index.mjs found"
          elif [ -d ".output/public" ]; then
            echo "MODE=pages-static" >> $GITHUB_OUTPUT
            echo "DEPLOY_DIR=.output/public" >> $GITHUB_OUTPUT
            echo "⚠️ static-only mode: no _worker.js, deploying static assets"
          elif [ -d "dist" ]; then
            echo "MODE=pages-static" >> $GITHUB_OUTPUT
            echo "DEPLOY_DIR=dist" >> $GITHUB_OUTPUT
            echo "⚠️ dist mode"
          else
            echo "❌ No output found"
            exit 1
          fi

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy (Cloudflare Pages)
        if: steps.scan.outputs.MODE == 'pages' || steps.scan.outputs.MODE == 'pages-static'
        run: |
          wrangler pages deploy "${{ steps.scan.outputs.DEPLOY_DIR }}" \
            --project-name=leafva-academy --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy (Cloudflare Workers)
        if: steps.scan.outputs.MODE == 'workers'
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
