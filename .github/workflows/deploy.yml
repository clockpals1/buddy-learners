name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          NODE_ENV: production

      - name: Scan dist contents
        run: |
          echo "== All files in dist/ =="
          find dist -type f 2>/dev/null | sort || echo "dist/ not found"
          echo ""
          echo "== All files in .output/ =="
          find .output -type f 2>/dev/null | sort || echo ".output/ not found"

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy (Cloudflare Pages)
        if: steps.scan.outputs.MODE == 'pages' || steps.scan.outputs.MODE == 'pages-static'
        run: |
          wrangler pages deploy "${{ steps.scan.outputs.DEPLOY_DIR }}" \
            --project-name=leafva-academy --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy (Cloudflare Workers)
        if: steps.scan.outputs.MODE == 'workers'
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
