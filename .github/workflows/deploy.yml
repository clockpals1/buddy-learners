name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          NODE_ENV: production

      - name: Scan build output
        run: |
          echo "== Top-level files/dirs =="
          ls -la
          echo "== Any .output? =="
          find .output -maxdepth 4 2>/dev/null || echo "NO .output"
          echo "== Any dist? =="
          find dist -maxdepth 4 2>/dev/null || echo "NO dist"
          echo "== Any .vinxi? =="
          find .vinxi -maxdepth 4 2>/dev/null || echo "NO .vinxi"
          echo "== All HTML/MJS files (not node_modules) =="
          find . -not -path "*/node_modules/*" -not -path "*/.git/*" \( -name "*.html" -o -name "*.mjs" -o -name "_worker.js" \) 2>/dev/null
