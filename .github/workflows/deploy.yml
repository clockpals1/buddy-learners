name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          NODE_ENV: production

      - name: Find build output directory
        id: find_output
        run: |
          echo "=== Post-build directory listing ==="
          ls -la
          echo ""
          if [ -d ".output/public" ]; then
            echo "DEPLOY_DIR=.output/public" >> $GITHUB_OUTPUT
            echo "✅ Found: .output/public"
            find .output/public -maxdepth 2
          elif [ -d ".output" ]; then
            echo "DEPLOY_DIR=.output" >> $GITHUB_OUTPUT
            echo "✅ Found: .output"
            find .output -maxdepth 2
          elif [ -d "dist" ]; then
            echo "DEPLOY_DIR=dist" >> $GITHUB_OUTPUT
            echo "✅ Found: dist"
            find dist -maxdepth 2
          else
            echo "❌ No build output found - build must have failed silently"
            exit 1
          fi

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Create Cloudflare Pages project (if not exists)
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"leafva-academy","production_branch":"main"}')
          echo "Create project response: $RESPONSE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          echo "Deploying from: ${{ steps.find_output.outputs.DEPLOY_DIR }}"
          wrangler pages deploy "${{ steps.find_output.outputs.DEPLOY_DIR }}" \
            --project-name=leafva-academy \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
